version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: risklens-db
    environment:
      POSTGRES_DB: ${DB_NAME:-risklens}
      POSTGRES_USER: ${DB_USERNAME:-risklens}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-risklens123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risklens -d risklens"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: risklens-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-risklens}
      - DB_USERNAME=${DB_USERNAME:-risklens}
      - DB_PASSWORD=${DB_PASSWORD:-risklens123}
      - JWT_SECRET=${JWT_SECRET:-RiskLensSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-900000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy-key-to-prevent-startup-failure}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: risklens-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
